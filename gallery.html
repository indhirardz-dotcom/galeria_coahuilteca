<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Galería Coahuilteca</title>

<style>
body{
  margin:0;
  font-family: Helvetica, Arial, sans-serif;
  background:#f7f4ef;
  color:#111;
  font-size:18px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
  padding-bottom:20px;
}

header img{
  height:40px;
}

nav{
  display:flex;
  gap:24px;
}

nav a{
  font-size:16px;
  letter-spacing:.1em;
  color:#555;
  text-decoration:none;
}

.section{
  padding:60px 0;
  border-top:1px solid #ddd;
}

.gallery-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:30px;
}

.art-link{
  display:block;
  overflow:hidden;
  border-radius:20px;
}

.art-link img{
  width:100%;
  display:block;
  transition:.4s;
}

.art-link:hover img{
  transform:scale(1.03);
  opacity:.9;
}

footer{
  margin-top:80px;
  padding-top:40px;
  border-top:1px solid #ddd;
  font-size:14px;
  color:#555;
  line-height:1.6;
}

footer a{
  color:#111;
  text-decoration:none;
}

@media(max-width:800px){
  .container{
    padding:22px;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }

  nav{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  }

  nav a{
    font-size:14px;
    margin:0;
  }

  .gallery-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
