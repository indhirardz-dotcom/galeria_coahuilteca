<style>
body{
  margin:0;
  font-family: Helvetica, Arial, sans-serif;
  background:#f7f4ef;
  color:#111;

  font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
padding-bottom:20px;
}

header img{height:40px;}

nav a{
margin-left:20px;
font-size:16px;
letter-spacing:.1em;
color:#555;
text-decoration:none;
}

.section{
padding:60px 0;
border-top:1px solid #ddd;
}

.gallery-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.art-link{
display:block;
overflow:hidden;
border-radius:20px;
}

.art-link img{
width:100%;
transition:.4s;
}

.art-link:hover img{
transform:scale(1.03);
opacity:.9;
}

.caption{
font-size:12px;
color:#666;
margin-top:10px;
text-transform:uppercase;
}

@media(max-width:800px){
.gallery-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
