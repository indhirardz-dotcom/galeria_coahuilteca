<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portraits in Oil | Indhira · Galería Coahuilteca</title>
<meta name="description" content="Commissioned oil portraits by Indhira at Galería Coahuilteca in San Miguel de Allende. Venetian technique, painted over time from photographic references.">

<style>
body{
  margin:0;
  font-family: Helvetica, Arial, sans-serif;
  background:#f7f4ef;
  color:#111;
  font-size:18px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
  padding-bottom:20px;
}

header img{
  height:40px;
}

nav{
  display:flex;
  gap:24px;
}

nav a{
  font-size:16px;
  letter-spacing:.1em;
  color:#555;
  text-decoration:none;
}

.hero{
  min-height:620px;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  background:#111;
  color:white;
  margin-top:30px;
  overflow:hidden;
}

.hero-content{
  padding:70px;
  max-width:560px;
}

.hero-kicker{
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:22px;
}

.hero h1{
  font-family:Georgia, serif;
  font-size:72px;
  line-height:.95;
  font-weight:400;
  margin:0;
}

.hero-line{
  width:160px;
  height:1px;
  background:white;
  margin:30px 0;
  opacity:.7;
}

.hero p{
  font-size:21px;
  line-height:1.45;
  max-width:520px;
  color:rgba(255,255,255,.88);
}

.hero-image{
  height:100%;
  min-height:620px;
  background:
    linear-gradient(90deg, rgba(0,0,0,.55), rgba(0,0,0,.05)),
    url('retrato-4.jpg');
  background-size:cover;
  background-position:center;
}

.button{
  display:inline-block;
  margin-top:20px;
  padding:15px 25px;
  border-radius:30px;
  background:black;
  color:white;
  text-decoration:none;
}

.hero .button{
  background:transparent;
  color:white;
  border:1px solid white;
  border-radius:0;
  padding:16px 34px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-size:13px;
}

.section{
  padding:60px 0;
  border-top:1px solid #ddd;
}

.two-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  align-items:center;
}

.two-grid img{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:20px;
}

.text-block h2{
  font-family:Georgia, serif;
  font-size:44px;
  line-height:1;
  font-weight:400;
  margin:0 0 24px;
}

.text-block p{
  color:#666;
  line-height:1.7;
}

.formats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.format-box{
  border:1px solid #ddd;
  padding:30px;
  border-radius:20px;
  background:white;
}

.format-box h3{
  font-family:Georgia, serif;
  font-size:34px;
  font-weight:400;
  margin:0 0 15px;
}

.price{
  font-family:Georgia, serif;
  font-size:26px;
  color:#111;
}

.cta{
  border:1px solid #ddd;
  padding:40px;
  border-radius:20px;
  background:white;
  display:grid;
  grid-template-columns:1fr auto;
  gap:30px;
  align-items:center;
}

.cta h2{
  font-family:Georgia, serif;
  font-size:38px;
  font-weight:400;
  margin:0 0 10px;
}

/* 🔽 SOLO ESTO ES NUEVO */
.back-to-top{
  position:fixed;
  bottom:25px;
  right:25px;
  width:42px;
  height:42px;
  border:1px solid #111;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#111;
  font-size:18px;
  background:#f7f4ef;
  z-index:9999;
}

.back-to-top:hover{
  background:#111;
  color:#fff;
}
/* 🔼 FIN NUEVO */

footer{
  margin-top:80px;
  padding-top:40px;
  border-top:1px solid #ddd;
  font-size:14px;
  color:#555;
  line-height:1.6;
}

footer a{
  color:#111;
  text-decoration:none;
}

/* CELULAR */
@media(max-width:800px){
  .container{
    padding:22px;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }

  header img{
    height:40px;
  }

  nav{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  }

  nav a{
    font-size:14px;
    margin:0;
  }

  .hero{
    grid-template-columns:1fr;
    min-height:auto;
  }

  .hero-image{
    min-height:420px;
    order:-1;
  }

  .hero-content{
    padding:45px 28px;
  }

  .hero h1{
    font-size:48px;
  }

  .two-grid,
  .formats,
  .cta{
    grid-template-columns:1fr;
  }

  .two-grid img{
    height:auto;
  }
}
</style>
