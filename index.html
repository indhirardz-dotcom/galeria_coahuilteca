<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art Gallery in San Miguel de Allende | Galería Coahuilteca</title>

<style>
body{
  margin:0;
  font-family: Helvetica, Arial, sans-serif;
  background:#f7f4ef;
  color:#111;
  font-size:18px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

/* HEADER HOMOLOGADO */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
  padding-bottom:20px;
}

header img{
  height:40px;
}

nav{
  display:flex;
  gap:24px;
}

nav a{
  font-size:16px;
  letter-spacing:.1em;
  color:#555;
  text-decoration:none;
}

/* MOBILE HEADER */
@media(max-width:800px){
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }

  nav{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  }

  nav a{
    font-size:14px;
    margin:0;
  }
}

/* HERO */
.hero{
  min-height:620px;
  display:flex;
  align-items:center;
  background:
    linear-gradient(90deg, rgba(0,0,0,0.68), rgba(0,0,0,0.10)),
    url('ceramica.jpg');
  background-size:cover;
  background-position:center;
  color:white;
  padding:90px 70px;
  margin-top:30px;
}

.hero-content{max-width:560px;}

.hero h1{
  font-family:Georgia, serif;
  font-size:72px;
  line-height:.95;
  font-weight:400;
  margin:0;
}

.hero p{
  font-size:21px;
  color:rgba(255,255,255,.88);
}

.button{
  display:inline-block;
  margin-top:20px;
  padding:15px 25px;
  background:black;
  color:white;
  text-decoration:none;
}

/* GRID */
.section{
  padding:60px 0;
  border-top:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card img{
  width:100%;
  height:340px;
  object-fit:cover;
  border-radius:15px;
}

/* MOBILE CONTENT */
@media(max-width:800px){
  .hero{
    padding:60px 28px;
  }

  .hero h1{
    font-size:48px;
  }

  .grid{
    grid-template-columns:1fr;
  }
}

/* FOOTER */
footer{
  margin-top:40px;
  padding-top:20px;
  border-top:1px solid #ddd;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">

<header>
  <a href="index.html">
    <img src="logo.png">
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="portraits.html">Portraits</a>
    <a href="experiences.html">Experiences</a>
    <a href="visit.html">Visit</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Original art,<br>ready to take home.</h1>

    <p>
      A working studio presenting paintings, drawings, ceramics and commissioned portraits.
    </p>

    <a class="button" href="https://wa.me/524152169737" target="_blank">
      Available artwork
    </a>
  </div>
</section>

<section class="section">
  <h2>Artists & work</h2>

  <div class="grid">

    <div class="card">
      <img src="amarillo.jpg">
      <h3>Fermigrante</h3>
    </div>

    <div class="card">
      <img src="pared.jpg">
      <h3>Indhira</h3>
    </div>

    <div class="card">
      <img src="ceramica.jpg">
      <h3>Venus Ceramista</h3>
    </div>

  </div>
</section>

<footer>
Galería Coahuilteca · San Miguel de Allende
</footer>

</div>

</body>
</html>
